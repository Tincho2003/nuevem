<!-- ════════════ OVERLAY ════════════ -->
<div id="overlay">

    <!-- Fase 1: corazón -->
    <div id="ov-intro">
        <div id="ov-heart-big">♥</div>
    </div>

    <!-- Fase 2: invitación -->
    <div class="ov-box" id="ov-box">
        <span class="ov-heart">♥</span>
        <div class="ov-names">Maiten</div>
        <div class="ov-question">Estás siendo cordialmente invitada a una salida romántica con tu novio ¿Aceptás esta invitación?</div>
        <div class="ov-btns">
            <button id="btn-si" onclick="acceptInvite()">Sí &nbsp;♥</button>
            <button id="btn-no">No</button>
        </div>
    </div>

</div>

<!-- ════════════ HERO ════════════ -->
<section id="hero">
    <div class="petals-container" id="petals"></div>
    <div class="hero-content">
        <div class="hero-eyebrow">una celebración de amor</div>
        <div class="hero-names">M &amp; M</div>
        <div class="hero-sub">Martín &amp; Maiten</div>
        <div class="divider">
            <div class="line"></div><div class="dot"></div><div class="line"></div>
        </div>
        <div class="hero-title">
            <span id="hero-toggle" class="hero-toggle">9 meses de novios</span>
        </div>
    </div>
    <div class="scroll-cue" onclick="document.getElementById('contador').scrollIntoView({behavior:'smooth'})">
        <span>seguir</span>
        <div class="arrow"></div>
    </div>
</section>

<div id="contador" class="full-bleed" style="padding: 10rem 2rem !important;">
    <div class="inner" style="text-align:center;">
        <div class="sec-title">Todavía es un secreto 🤫🤫</div>
        <div class="sec-sub">Pronto vas a descubrir todo lo que tengo planeado para vos ♥</div>
    </div>
</div>
